<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fyon — AI for the version of you worth becoming</title>
<style>
  /* ===========================================================
     FYON · Liquid Glass transformation card
     Recreates the "Liquid Glass" travel-card look, retargeted to
     a self-improvement AI: a route from who you are -> who you'll
     become. Pure HTML/CSS/JS, no assets, no build step.
     =========================================================== */
  :root{
    --ink:#0b1220;
    --blue:#2f7bff;          /* the accent blue (the plane/icon) */
    --glass-bg:rgba(255,255,255,0.14);
    --glass-brd:rgba(255,255,255,0.55);
    --font:"SF Pro Display","Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--font);
    color:#fff;
    overflow:hidden;
    background:#1a2740;
  }

  /* ---------- sky ---------- */
  .sky{
    position:fixed; inset:0;
    background:
      radial-gradient(120% 90% at 78% 8%, #5b7fb4 0%, transparent 55%),
      radial-gradient(140% 120% at 85% 0%, #8fb0d8 0%, transparent 45%),
      linear-gradient(180deg, #38567f 0%, #29405f 38%, #1d2c44 70%, #141d2e 100%);
  }
  /* warm sun glow lower-right, like the golden cloud light */
  .sky::after{
    content:""; position:absolute; inset:0;
    background:radial-gradient(60% 50% at 72% 62%, rgba(255,214,160,0.35), transparent 60%);
    mix-blend-mode:screen;
  }
  /* drifting cloud blobs (blurred soft shapes) */
  .cloud{
    position:absolute; border-radius:50%;
    filter:blur(40px); opacity:.55; mix-blend-mode:screen;
    animation:float-cloud linear infinite;
  }
  .c1{width:60vw;height:34vw;left:-10vw;top:48%; background:radial-gradient(circle,#cdd9ec,transparent 70%); animation-duration:70s}
  .c2{width:48vw;height:30vw;right:-8vw;top:8%;  background:radial-gradient(circle,#aebfd8,transparent 70%); opacity:.4; animation-duration:90s; animation-direction:reverse}
  .c3{width:40vw;height:24vw;left:30%;bottom:-6vw;background:radial-gradient(circle,#f2dcb8,transparent 70%); opacity:.35; animation-duration:110s}
  .c4{width:30vw;height:18vw;left:8%;top:6%;     background:radial-gradient(circle,#dce7f6,transparent 70%); opacity:.3; animation-duration:80s; animation-direction:reverse}
  @keyframes float-cloud{
    0%{transform:translateX(-4vw)}
    50%{transform:translateX(6vw)}
    100%{transform:translateX(-4vw)}
  }
  /* faint grain so the gradient reads as photographic */
  .sky-grain{position:fixed;inset:0;opacity:.05;pointer-events:none;
    background-image:radial-gradient(#fff 1px,transparent 1px);background-size:3px 3px}

  /* ---------- brand mark ---------- */
  .brand{
    position:fixed; top:30px; left:38px; z-index:5;
    display:flex; align-items:center; gap:10px;
    font-weight:700; letter-spacing:.5px; font-size:20px;
    text-shadow:0 2px 18px rgba(0,0,0,.35);
  }
  .brand .dot{
    width:20px;height:20px;border-radius:6px;
    background:linear-gradient(135deg,#7db4ff,var(--blue));
    box-shadow:0 0 18px rgba(47,123,255,.8);
  }

  /* ---------- the liquid glass card ---------- */
  .stage{position:relative;height:100%;display:grid;place-items:center;z-index:3}
  .glass{
    position:relative;
    width:min(58vw,720px);
    aspect-ratio:16/10;
    border-radius:34px;
    padding:34px 40px;
    background:var(--glass-bg);
    -webkit-backdrop-filter:blur(26px) saturate(165%);
    backdrop-filter:blur(26px) saturate(165%);
    border:1px solid var(--glass-brd);
    box-shadow:
      0 30px 80px rgba(8,16,34,.45),
      inset 0 1px 1px rgba(255,255,255,.55),
      inset 0 -20px 40px rgba(120,150,200,.10);
    overflow:hidden;
    animation:bob 7s ease-in-out infinite;
  }
  /* glossy top-left specular sheen — the "liquid" highlight */
  .glass::before{
    content:""; position:absolute; left:0; top:0; right:0; height:55%;
    background:linear-gradient(160deg, rgba(255,255,255,.35), rgba(255,255,255,0) 60%);
    pointer-events:none;
  }
  /* moving glint that sweeps across the glass */
  .glass::after{
    content:""; position:absolute; top:-60%; left:-30%;
    width:50%; height:220%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
    transform:rotate(18deg);
    animation:sweep 6s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes sweep{0%,100%{left:-40%}50%{left:120%}}
  @keyframes bob{0%,100%{transform:translateY(-6px)}50%{transform:translateY(6px)}}

  /* date, top-left */
  .date{position:absolute; top:30px; left:38px; line-height:.9}
  .date .d{font-size:clamp(28px,3vw,40px); font-weight:700}
  .date .m{font-size:14px; opacity:.6; letter-spacing:2px; text-transform:uppercase; margin-top:4px}

  /* center icon + route */
  .route{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    display:flex; flex-direction:column; align-items:center;
  }
  .puck{
    width:62px;height:62px;border-radius:50%;
    background:#fff; display:grid; place-items:center;
    box-shadow:0 10px 30px rgba(0,0,0,.25), 0 0 0 8px rgba(255,255,255,.12);
    animation:pulse 3.6s ease-in-out infinite;
  }
  .puck svg{width:30px;height:30px;fill:var(--blue)}
  @keyframes pulse{0%,100%{box-shadow:0 10px 30px rgba(0,0,0,.25),0 0 0 8px rgba(255,255,255,.10)}
                   50%{box-shadow:0 10px 36px rgba(0,0,0,.3),0 0 0 14px rgba(255,255,255,.05)}}
  .dots{ margin-top:14px; display:flex; flex-direction:column; gap:7px; align-items:center}
  .dots i{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.7);
          animation:twinkle 1.6s ease-in-out infinite}
  .dots i:nth-child(2){animation-delay:.2s}.dots i:nth-child(3){animation-delay:.4s}
  .dots i:nth-child(4){animation-delay:.6s}.dots i:nth-child(5){animation-delay:.8s}
  @keyframes twinkle{0%,100%{opacity:.25}50%{opacity:1}}

  /* From / To blocks bottom corners */
  .ends{position:absolute; left:40px; right:40px; bottom:34px;
        display:flex; justify-content:space-between; align-items:flex-end}
  .end .lbl{font-size:15px; opacity:.7; margin-bottom:6px}
  .end .val{font-size:clamp(26px,3.4vw,44px); font-weight:700; letter-spacing:-.5px;
            height:1.1em; overflow:hidden; position:relative}
  .end.to{text-align:right}
  /* kinetic text: the rolling word */
  .word{display:inline-block; animation:roll .7s cubic-bezier(.2,.7,.2,1)}
  @keyframes roll{
    0%{transform:translateY(60%); filter:blur(6px); opacity:0}
    100%{transform:translateY(0); filter:blur(0); opacity:1}
  }

  /* tagline + footer */
  .tag{position:fixed; bottom:84px; left:0; right:0; text-align:center; z-index:4;
       font-size:clamp(15px,2vw,20px); font-weight:500; opacity:.92;
       text-shadow:0 2px 18px rgba(0,0,0,.4)}
  .foot{position:fixed; bottom:30px; left:0; right:0; text-align:center; z-index:4;
        font-size:13px; opacity:.6; letter-spacing:.3px}

  @media(max-width:760px){
    .glass{width:86vw; aspect-ratio:4/5; padding:26px}
    .ends{left:26px;right:26px}
    .date{left:26px}
    .brand{left:22px;top:22px}
  }
</style>
</head>
<body>
  <div class="sky">
    <div class="cloud c1"></div><div class="cloud c2"></div>
    <div class="cloud c3"></div><div class="cloud c4"></div>
  </div>
  <div class="sky-grain"></div>

  <div class="brand"><span class="dot"></span>Fyon</div>

  <div class="stage">
    <div class="glass">
      <div class="date"><div class="d" id="day">27</div><div class="m" id="mon">Dec</div></div>

      <div class="route">
        <div class="puck">
          <!-- AI spark icon (blue), echoing the blue plane -->
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2l1.8 5.6a4 4 0 0 0 2.6 2.6L22 12l-5.6 1.8a4 4 0 0 0-2.6 2.6L12 22l-1.8-5.6a4 4 0 0 0-2.6-2.6L2 12l5.6-1.8a4 4 0 0 0 2.6-2.6L12 2z"/>
          </svg>
        </div>
        <div class="dots"><i></i><i></i><i></i><i></i><i></i></div>
      </div>

      <div class="ends">
        <div class="end from">
          <div class="lbl">From</div>
          <div class="val" id="from"></div>
        </div>
        <div class="end to">
          <div class="lbl">To</div>
          <div class="val" id="to"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="tag">Tell Fyon your goals. It maps the route to your future self.</div>
  <div class="foot">© All Rights Reserved · Fyon</div>

<script>
  // today's date in the corner
  const now = new Date();
  document.getElementById('day').textContent = now.getDate();
  document.getElementById('mon').textContent =
    now.toLocaleString('en',{month:'short'});

  // ---- the transformation routes Fyon plots (edit freely) ----
  const ROUTES = [
    { from:"Scattered",  to:"Focused"   },
    { from:"Unfit",      to:"Strong"    },
    { from:"Anxious",    to:"Grounded"  },
    { from:"Stuck",      to:"Limitless" },
    { from:"Average",    to:"Elite"     },
    { from:"Who you are",to:"Who you'll be" },
  ];

  const fromEl = document.getElementById('from');
  const toEl   = document.getElementById('to');
  let i = -1;

  function show(text, el){
    el.innerHTML = `<span class="word">${text}</span>`;
  }
  function next(){
    i = (i + 1) % ROUTES.length;
    show(ROUTES[i].from, fromEl);
    setTimeout(() => show(ROUTES[i].to, toEl), 220); // staggered roll
  }
  next();
  setInterval(next, 3200);
</script>
</body>
</html>
